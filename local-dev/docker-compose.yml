version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: local-ai-memory
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localpassword123
      POSTGRES_DB: ai_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: