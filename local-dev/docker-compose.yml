version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: local-ai-memory
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localpassword123
      POSTGRES_DB: ai_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: local-redis
    ports:
      - "6379:6379"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: local-litellm
    ports:
      - "4000:4000"
    environment:
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-2024-02-15-preview}
      # Force Redis connection via environment variables
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./litellm-local-config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--detailed_debug" ]
    depends_on:
      - redis
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: local-otel-collector
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    environment:
      # Pass your Dynatrace credentials into the container
      - DYNATRACE_ENDPOINT=${DYNATRACE_ENDPOINT}
      - DYNATRACE_API_TOKEN=${DYNATRACE_API_TOKEN}
    volumes:
      - ./otel-local-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
volumes:
  pgdata: