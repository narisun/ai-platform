model_list:
  - model_name: complex-routing  # LangGraph asks for this
    litellm_params:
      # The 'azure/' prefix tells LiteLLM which cloud provider API to use.
      model: azure/gpt-4o-mini-deployment
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

litellm_settings:
  cache: true
  cache_type: redis
  redis_host: "redis" 
  redis_port: 6379